<!DOCTYPE html><html lang="id">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Simulasi Titrasi Asam Basa</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen">  <h1 class="text-3xl font-bold mb-4">Simulasi Titrasi Asam Basa 🧪</h1>

  <p class="mb-6 text-gray-300">Tambahkan NaOH ke HCl dan lihat perubahan pH</p>  <div class="bg-gray-800 p-6 rounded-2xl shadow-xl w-80">

    <label class="block mb-2">Volume NaOH (mL):</label>

    <input id="volume" type="range" min="0" max="100" value="0" class="w-full">

    <p class="mt-2">Volume: <span id="volValue">0</span> mL</p><div class="mt-6">

  <p class="text-lg">pH: <span id="phValue">1</span></p>

  <div id="indicator" class="mt-3 w-full h-10 rounded-xl"></div>

</div>



  </div>  <script>

    const volume = document.getElementById("volume");

    const volValue = document.getElementById("volValue");

    const phValue = document.getElementById("phValue");

    const indicator = document.getElementById("indicator");



    volume.addEventListener("input", () => {

      let v = volume.value;

      volValue.textContent = v;



      // Simulasi sederhana

      let ph = 1 + (v / 100) * 13;

      ph = ph.toFixed(2);

      phValue.textContent = ph;



      // Warna indikator

      let color = "red";

      if (ph > 3 && ph <= 7) color = "orange";

      if (ph > 7 && ph <= 11) color = "green";

      if (ph > 11) color = "blue";



      indicator.style.backgroundColor = color;

    });

  </script></body>

</html>
